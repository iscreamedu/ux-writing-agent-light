name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API secrets
        env:
          GEMINI_K: ${{ secrets.GEMINI_K }}
        run: |
          mkdir dist
          cp index.html dist/index.html
          cp guide-data.json dist/guide-data.json
          python3 -c "import os; f=open('dist/index.html','r',encoding='utf-8'); c=f.read(); f.close(); c=c.replace('__GEMINI_K__',os.environ['GEMINI_K']); f=open('dist/index.html','w',encoding='utf-8'); f.write(c); f.close()"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - uses: actions/deploy-pages@v4
        id: deployment
